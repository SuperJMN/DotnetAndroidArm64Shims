name: build-shims

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      pack_version:
        description: "Microsoft.Android.Sdk.Linux pack version to shim"
        default: "36.1.53"

permissions:
  contents: read

env:
  PACK_VERSION: ${{ github.event.inputs.pack_version || '36.1.53' }}

jobs:
  reference:
    name: extract-upstream-reference
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl unzip binutils
      - name: extract reference symbols + version
        run: bash scripts/extract-reference-symbols.sh
      - uses: actions/upload-artifact@v4
        with:
          name: arm64-reference-${{ env.PACK_VERSION }}
          path: out/arm64-reference/${{ env.PACK_VERSION }}/
          retention-days: 14

  build-so:
    name: build-${{ matrix.shim }}
    needs: reference
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
      matrix:
        shim: [libMono.Unix, libZipSharpNative]
    steps:
      - uses: actions/checkout@v4
      - name: download upstream reference
        uses: actions/download-artifact@v4
        with:
          name: arm64-reference-${{ env.PACK_VERSION }}
          path: out/arm64-reference/${{ env.PACK_VERSION }}/
      - name: build inside debian:11 (glibc 2.31 baseline for Pi OS bullseye)
        # Building on the bare ubuntu-22.04-arm runner produces .so libs that
        # need GLIBC_2.33 (stat/fstat/lstat/mknod versioning), which fails on
        # Raspberry Pi OS bullseye with "version `GLIBC_2.33' not found".
        # Building inside debian:11 yields binaries linked against glibc 2.31,
        # which is forward-compatible to bookworm and any newer distro.
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e PACK_VERSION="$PACK_VERSION" \
            debian:11 bash -c '
              set -euo pipefail
              apt-get update -y
              apt-get install -y --no-install-recommends ca-certificates curl
              xargs -a "shims/${{ matrix.shim }}/apt-deps.txt" apt-get install -y --no-install-recommends
              bash "shims/${{ matrix.shim }}/build.sh"
              bash "shims/${{ matrix.shim }}/verify-symbols.sh"
            '
      - uses: actions/upload-artifact@v4
        with:
          name: shim-${{ matrix.shim }}-${{ env.PACK_VERSION }}
          path: out/linux-arm64/
          retention-days: 14

  build-aapt2:
    name: build-aapt2
    needs: reference
    # x86_64 host — Android NDK is published for linux-x86_64 only. The
    # cross-compiled output is arm64-v8a static-bionic; it runs natively on any
    # aarch64 Linux kernel (verified on Pi OS bullseye / glibc 2.31). See
    # docs/aapt2.md for why the static-bionic ABI is compatible with Linux arm64.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install host deps
        run: |
          sudo apt-get update -y
          xargs -a shims/aapt2/apt-deps.txt sudo apt-get install -y --no-install-recommends
      - name: build aapt2
        run: bash shims/aapt2/build.sh
      - name: copy aapt2 binary into runner so verify-daemon (arm64 SoC) gets it
        # We do version verification here on x86_64 — the binary still runs
        # because the version path doesn't issue any arm64 syscalls. Daemon
        # smoke-test is more invasive and is deferred to the .so-side job
        # (see end-to-end validation on rpi4).
        run: bash shims/aapt2/verify-version.sh
      - uses: actions/upload-artifact@v4
        with:
          name: shim-aapt2-${{ env.PACK_VERSION }}
          path: out/linux-arm64/
          retention-days: 14

  install-shims-smoketest:
    name: install-shims smoketest
    needs: [build-so, build-aapt2]
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck + LLVM 19 (Phase 6 binutils overlay)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y shellcheck wget gnupg ca-certificates binutils
          # apt.llvm.org publishes arm64 packages for the supported Ubuntu LTS
          # codenames; ubuntu-22.04-arm runs jammy.
          codename="$(. /etc/os-release && echo "$VERSION_CODENAME")"
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/apt.llvm.org.gpg
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-19 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update -y
          sudo apt-get install -y llvm-19 lld-19
          test -x /usr/lib/llvm-19/bin/llc
          test -x /usr/lib/llvm-19/bin/ld.lld
      - name: shellcheck
        run: shellcheck scripts/install-shims.sh scripts/package-release.sh scripts/extract-reference-symbols.sh
      - name: collect built shims
        uses: actions/download-artifact@v4
        with:
          pattern: shim-*-${{ env.PACK_VERSION }}
          path: out/linux-arm64/
          merge-multiple: true
      - name: package release tarball
        run: bash scripts/package-release.sh
      - name: stand up fake pack tree
        run: |
          set -euo pipefail
          fake="$RUNNER_TEMP/fake-dotnet"
          pack="$fake/packs/Microsoft.Android.Sdk.Linux/${PACK_VERSION}"
          mkdir -p "$pack/tools/Linux/binutils/bin"
          # touch placeholder x86_64 binaries so backup logic exercises
          : > "$pack/tools/libMono.Unix.so"
          : > "$pack/tools/libZipSharpNative-3-3.so"
          # binutils/bin placeholders — non-empty, executable, so backup logic
          # treats them as real x86_64 originals.
          for b in as ld llc llvm-mc llvm-objcopy llvm-strip; do
            printf 'x86_64 placeholder for %s\n' "$b" > "$pack/tools/Linux/binutils/bin/$b"
            chmod +x "$pack/tools/Linux/binutils/bin/$b"
          done
          # serve dist/ over a local HTTP server so install-shims.sh can fetch it
          mkdir -p "$RUNNER_TEMP/release/${PACK_VERSION}"
          cp dist/shims-linux-arm64-${PACK_VERSION}.tar.gz "$RUNNER_TEMP/release/${PACK_VERSION}/"
          (cd "$RUNNER_TEMP/release" && python3 -m http.server 8765 >/tmp/serve.log 2>&1 &)
          sleep 1
          PACK_ROOT="$fake/packs/Microsoft.Android.Sdk.Linux" \
            RELEASE_BASE="http://127.0.0.1:8765" \
            bash scripts/install-shims.sh --version "${PACK_VERSION}" --llvm-major 19
          # re-run: must be a no-op for both .so/aapt2 AND binutils symlinks
          PACK_ROOT="$fake/packs/Microsoft.Android.Sdk.Linux" \
            RELEASE_BASE="http://127.0.0.1:8765" \
            bash scripts/install-shims.sh --version "${PACK_VERSION}" --llvm-major 19 \
            | tee /tmp/second.log
          grep -q "already shimmed" /tmp/second.log
          grep -q "already symlinked" /tmp/second.log
      - name: assert binutils overlay
        run: |
          set -euo pipefail
          bindir="$RUNNER_TEMP/fake-dotnet/packs/Microsoft.Android.Sdk.Linux/${PACK_VERSION}/tools/Linux/binutils/bin"
          backup="$RUNNER_TEMP/fake-dotnet/packs/Microsoft.Android.Sdk.Linux/${PACK_VERSION}/tools/Linux/binutils/.x86_64-backup"
          declare -A want=(
            [as]=/usr/bin/as
            [ld]=/usr/lib/llvm-19/bin/ld.lld
            [llc]=/usr/lib/llvm-19/bin/llc
            [llvm-mc]=/usr/lib/llvm-19/bin/llvm-mc
            [llvm-objcopy]=/usr/lib/llvm-19/bin/llvm-objcopy
            [llvm-strip]=/usr/lib/llvm-19/bin/llvm-strip
          )
          for bin in "${!want[@]}"; do
            target="$(readlink "$bindir/$bin" || true)"
            if [[ "$target" != "${want[$bin]}" ]]; then
              echo "FAIL: $bin -> '$target' (expected '${want[$bin]}')" >&2
              exit 1
            fi
            test -f "$backup/$bin" || { echo "FAIL: backup missing for $bin" >&2; exit 1; }
            "$bindir/$bin" --version >/dev/null
            echo "OK: $bin -> ${want[$bin]} (backed up, --version runs)"
          done
      - name: --skip-binutils still works on a host with LLVM
        run: |
          set -euo pipefail
          fake2="$RUNNER_TEMP/fake-dotnet-skip"
          pack="$fake2/packs/Microsoft.Android.Sdk.Linux/${PACK_VERSION}"
          mkdir -p "$pack/tools/Linux/binutils/bin"
          : > "$pack/tools/libMono.Unix.so"
          : > "$pack/tools/libZipSharpNative-3-3.so"
          for b in as ld llc llvm-mc llvm-objcopy llvm-strip; do
            printf 'placeholder %s\n' "$b" > "$pack/tools/Linux/binutils/bin/$b"
            chmod +x "$pack/tools/Linux/binutils/bin/$b"
          done
          PACK_ROOT="$fake2/packs/Microsoft.Android.Sdk.Linux" \
            RELEASE_BASE="http://127.0.0.1:8765" \
            bash scripts/install-shims.sh --version "${PACK_VERSION}" --skip-binutils
          # binutils dir must still hold real files (not symlinks)
          test ! -L "$pack/tools/Linux/binutils/bin/llc"
          test ! -d "$pack/tools/Linux/binutils/.x86_64-backup"
