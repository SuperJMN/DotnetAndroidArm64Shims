name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      pack_version:
        description: "Pack version tag to (re)release"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04-arm
    env:
      PACK_VERSION: ${{ github.event.inputs.pack_version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: install build deps (union of all shims)
        run: |
          sudo apt-get update -y
          sort -u shims/*/apt-deps.txt | xargs sudo apt-get install -y

      - name: extract upstream reference
        run: bash scripts/extract-reference-symbols.sh

      - name: build libMono.Unix
        run: bash shims/libMono.Unix/build.sh
      - name: verify libMono.Unix
        run: bash shims/libMono.Unix/verify-symbols.sh

      - name: build libZipSharpNative
        run: bash shims/libZipSharpNative/build.sh
      - name: verify libZipSharpNative
        run: bash shims/libZipSharpNative/verify-symbols.sh

      - name: build aapt2
        run: bash shims/aapt2/build.sh
      - name: verify aapt2 version
        run: bash shims/aapt2/verify-version.sh
      - name: verify aapt2 daemon
        run: bash shims/aapt2/verify-daemon.sh

      - name: package release tarball
        run: bash scripts/package-release.sh

      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PACK_VERSION }}
          name: shims-linux-arm64-${{ env.PACK_VERSION }}
          generate_release_notes: true
          files: |
            dist/shims-linux-arm64-${{ env.PACK_VERSION }}.tar.gz
            dist/shims-linux-arm64-${{ env.PACK_VERSION }}.tar.gz.sha256
