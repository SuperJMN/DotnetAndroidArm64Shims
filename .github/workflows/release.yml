name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      pack_version:
        description: "Pack version tag to (re)release"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04-arm
    env:
      PACK_VERSION: ${{ github.event.inputs.pack_version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: extract upstream reference
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl unzip binutils
          bash scripts/extract-reference-symbols.sh

      - name: build shims inside debian:11 (glibc 2.31 baseline)
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e PACK_VERSION="$PACK_VERSION" \
            debian:11 bash -c '
              set -euo pipefail
              apt-get update -y
              apt-get install -y --no-install-recommends ca-certificates curl
              sort -u shims/*/apt-deps.txt | xargs apt-get install -y --no-install-recommends
              bash shims/libMono.Unix/build.sh
              bash shims/libMono.Unix/verify-symbols.sh
              bash shims/libZipSharpNative/build.sh
              bash shims/libZipSharpNative/verify-symbols.sh
            '

      # aapt2 deferred for v1 — see docs/aapt2.md and STATUS.md.

      - name: package release tarball
        run: bash scripts/package-release.sh

      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PACK_VERSION }}
          name: shims-linux-arm64-${{ env.PACK_VERSION }}
          generate_release_notes: true
          files: |
            dist/shims-linux-arm64-${{ env.PACK_VERSION }}.tar.gz
            dist/shims-linux-arm64-${{ env.PACK_VERSION }}.tar.gz.sha256
